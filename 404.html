<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Colibrí Boba Tea - Redireccionando...</title>
    <script type="text/javascript">
        // SPA redirect fix para GitHub Pages
        // Cuando alguien accede a una ruta que no existe, redirige al index con la ruta preservada
        var pathSegmentsToKeep = 1; // 1 para repos de proyecto (tuusuario.github.io/reponame/)

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body>
    <p>Redireccionando a Colibrí Boba Tea...</p>
</body>
</html>
